name: Build ADP CLI

on:
  push:
    tags:
      - 'v*'
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows
            binary_name: adp.exe
            artifact_name: adp-cli-windows-x64.zip
          - os: ubuntu-latest
            platform: linux
            binary_name: adp
            artifact_name: adp-cli-linux-x64.tar.gz
          - os: macos-latest
            platform: macos
            binary_name: adp
            artifact_name: adp-cli-macos-x64.tar.gz
          - os: macos-latest
            platform: macos-arm
            arch: arm64
            binary_name: adp
            artifact_name: adp-cli-macos-arm64.tar.gz

    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          architecture: ${{ matrix.arch || 'x64' }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Build with PyInstaller
        run: |
          pyinstaller adp_cli.spec --clean --noconfirm

      - name: Test executable (Linux/macOS)
        if: matrix.platform != 'windows'
        run: |
          chmod +x dist/adp
          ./dist/adp --version

      - name: Test executable (Windows)
        if: matrix.platform == 'windows'
        run: |
          ./dist/adp.exe --version

      - name: Create archive (Linux/macOS)
        if: matrix.platform != 'windows'
        run: |
          cd dist
          tar -czf ${{ matrix.artifact_name }} ${{ matrix.binary_name }}

      - name: Create archive (Windows)
        if: matrix.platform == 'windows'
        run: |
          cd dist
          7z a ${{ matrix.artifact_name }} ${{ matrix.binary_name }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.artifact_name }}

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Upload to Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/*/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
