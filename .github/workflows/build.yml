name: Build ADP CLI

on:
  push:
    tags:
      - 'v*'
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win32-x64
            binary_name: adp.exe
            artifact_name: win32-x64
            shell: cmd
          - os: ubuntu-20.04
            platform: linux-x64
            binary_name: adp
            artifact_name: linux-x64
            shell: bash
          - os: ubuntu-22.04-arm
            platform: linux-arm64
            binary_name: adp
            artifact_name: linux-arm64
            shell: bash
          - os: macos-14
            platform: darwin-x64
            binary_name: adp
            artifact_name: darwin-x64
            shell: bash
          # - os: macos-14
          #   platform: darwin-arm64
          #   binary_name: adp
          #   artifact_name: darwin-arm64
          #   shell: bash

    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: ${{ matrix.shell }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.8'

      - name: Install dependencies (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Install dependencies (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          python3 -m pip install --upgrade pip
          pip3 install pyinstaller
          pip3 install -r requirements.txt

      - name: Create output directory (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          if not exist dist\${{ matrix.platform }} mkdir dist\${{ matrix.platform }}

      - name: Create output directory (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          mkdir -p dist/${{ matrix.platform }}

      - name: Build with PyInstaller
        run: |
          pyinstaller adp_cli.spec --clean --noconfirm

      - name: Move binary to platform directory (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          move dist\${{ matrix.binary_name }} dist\${{ matrix.platform }}\${{ matrix.binary_name }}

      - name: Move binary to platform directory (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          mv dist/${{ matrix.binary_name }} dist/${{ matrix.platform }}/${{ matrix.binary_name }}

      - name: Verify binary exists (Unix only)
        if: matrix.os != 'windows-latest'
        run: |
          if [ -f "dist/${{ matrix.platform }}/${{ matrix.binary_name }}" ]; then
            echo "Build successful: dist/${{ matrix.platform }}/${{ matrix.binary_name }}"
          else
            echo "Build failed: binary not found"
            exit 1
          fi

      - name: Verify binary exists (Windows only)
        if: matrix.os == 'windows-latest'
        run: |
          if exist "dist\${{ matrix.platform }}\${{ matrix.binary_name }}" (
            echo Build successful: dist\${{ matrix.platform }}\${{ matrix.binary_name }}
          ) else (
            echo Build failed: binary not found
            exit /b 1
          )

      - name: Test executable (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          chmod +x dist/${{ matrix.platform }}/${{ matrix.binary_name }}
          dist/${{ matrix.platform }}/${{ matrix.binary_name }} --version

      - name: Test executable (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          dist\${{ matrix.platform }}\${{ matrix.binary_name }} --version

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.platform }}/${{ matrix.binary_name }}

  npm-publish:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/npm

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install npm dependencies
        run: npm install

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  github-release:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/github

      - name: Display structure
        run: ls -la artifacts/github/

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/github/*/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
